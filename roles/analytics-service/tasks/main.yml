- name: Install Python
  ansible.builtin.dnf:
    name:
      - python3.12
      - python3.12-pip
      - python3.12-devel
      - gcc
    state: present

- name: include pre-reqs
  ansible.builtin.include_role:
    name: common
    tasks_from: pre-reqs.yml

- name: Install application dependencies
  ansible.builtin.shell: pip3.12 install --no-cache-dir .
  args:
    chdir: /app

- name: include systemd
  ansible.builtin.include_role:
    name: common
    tasks_from: systemd.yml